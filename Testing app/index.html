<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up / Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>ACCOUNT PORTAL</header>
        <div class="switch-panel">
            <span id="signupPrompt">Already have an account? <button type="button" id="showLogin">Login</button></span>
            <span id="loginPrompt" class="hidden">Need an account? <button type="button" id="showSignup">Sign up</button></span>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="step">
                <p>Name</p>
                <div class="bullet"><span>1</span></div>
                <div class="check"><i class="fas fa-check"></i></div>
            </div>
            <div class="step">
                <p>Contact</p>
                <div class="bullet"><span>2</span></div>
                <div class="check"><i class="fas fa-check"></i></div>
            </div>
            <div class="step">
                <p>Birth</p>
                <div class="bullet"><span>3</span></div>
                <div class="check"><i class="fas fa-check"></i></div>
            </div>
            <div class="step">
                <p>Login</p>
                <div class="bullet"><span>4</span></div>
                <div class="check"><i class="fas fa-check"></i></div>
            </div>
        </div>

        <div class="form-outer" id="signupSection">
            <form id="signupForm">
                <div class="page">
                    <div class="title">Basic Info</div>
                    <div class="field">
                        <label for="FirstName">First Name</label>
                        <input type="text" id="FirstName" name="firstName" required>
                    </div>
                    <div class="field">
                        <label for="LastName">Last Name</label>
                        <input type="text" id="LastName" name="lastName" required>
                    </div>
                    <div class="button-row single">
                        <button type="button" class="next">Next</button>
                    </div>
                </div>

                <div class="page">
                    <div class="title">Contact Info</div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="field">
                        <label for="Phone">Phone Number</label>
                        <input type="tel" id="Phone" name="phone" required>
                    </div>
                    <div class="button-row">
                        <button type="button" class="prev">Previous</button>
                        <button type="button" class="next">Next</button>
                    </div>
                </div>

                <div class="page">
                    <div class="title">Date of Birth</div>
                    <div class="field">
                        <label for="Date">Date</label>
                        <input type="date" id="Date" name="date" required>
                    </div>
                    <div class="field">
                        <label for="Gender">Gender</label>
                        <select id="Gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="button-row">
                        <button type="button" class="prev">Previous</button>
                        <button type="button" class="next">Next</button>
                    </div>
                </div>

                <div class="page">
                    <div class="title">Login Information</div>
                    <div class="field">
                        <label for="UserName">Username</label>
                        <input type="text" id="UserName" name="username" required>
                    </div>
                    <div class="field">
                        <label for="Password">Password</label>
                        <input type="password" id="Password" name="password" required>
                    </div>
                    <div class="button-row">
                        <button type="button" class="prev">Previous</button>
                        <button type="submit" class="submit">Create account</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="form-outer hidden" id="loginSection">
            <form id="loginForm">
                <div class="login-page">
                    <div class="title">Login</div>
                    <div class="field">
                        <label for="loginUser">Username or Email</label>
                        <input type="text" id="loginUser" name="loginUser" required>
                    </div>
                    <div class="field">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="loginPassword" required>
                    </div>
                    <div class="button-row">
                        <button type="button" class="prev" id="backToSignup">Back</button>
                        <button type="submit" class="submit">Sign in</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="form-outer hidden" id="dashboardSection">
            <div class="login-page">
                <div class="title">Dashboard</div>
                <div class="field">
                    <label>Username</label>
                    <div id="dashboardUsername"></div>
                </div>
                <div class="field">
                    <label>Email</label>
                    <div id="dashboardEmail"></div>
                </div>
                <div class="field">
                    <label>Name</label>
                    <div id="dashboardName"></div>
                </div>
                <div class="field">
                    <label>Phone</label>
                    <div id="dashboardPhone"></div>
                </div>
                <div class="field">
                    <label>Date of Birth</label>
                    <div id="dashboardDob"></div>
                </div>
                <div class="field">
                    <label>Gender</label>
                    <div id="dashboardGender"></div>
                </div>
                <div class="button-row">
                    <button type="button" class="prev" id="logoutButton">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal hidden" id="summaryModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">×</button>
            <h2>Account Summary</h2>
            <div id="modalContent"></div>
            <div class="modal-actions">
                <button id="downloadJson" class="submit">Download data.json</button>
                <button id="closeModalSecondary" class="prev">Close</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
