<!DOCTYPE html>

<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>Entry form</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudlare.com/ajax/libs/font.awesome/5.15.3/css/all.min.css"/>

        <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
</script>
<script type="text/javascript">
   (function(){
      emailjs.init({
        publicKey: "s-3r3kY1_0KxlI-kD",
      });
   })();
</script>


    </head>
    <body>
        <div class="container">
            <header>CONTACT US</header>
            <div class="progress-bar">
                <div class="step">
                    <p>Name</p>
                    <div class="bullet">
                        <span>1</span>
                    </div>
                    <div class="check"></div>
                </div>
   
                <div class="step">
                    <p>Contact</p>
                    <div class="bullet">
                        <span>2</span>
                    </div>
                    <div class="check"></div>
                </div>

                <div class="step">
                    <p>Birth</p>
                    <div class="bullet">
                        <span>3</span>
                    </div>
                    <div class="check"></div>
                </div>

                <div class="step">
                    <p>Submit</p>
                    <div class="bullet">
                        <span>4</span>
                    </div>
                    <div class="check"></div>
                </div>

            </div>

            <div class="form-outer">
                <form onsubmit="sendmail(); reset(); return false">
                    <div class="page slide-page">
                        <div class="title">Basic Info: </div>
                        <div class="field">
                            <div class="label">First Name</div>
                            <input type="text" id="FirstName" required>
                        </div>

                         <div class="field">
                            <div class="label">Last Name</div>
                            <input type="text" id="LastName" required>
                        </div>

                         <div class="field">
                                <button class="prev">PREVIOUS </button>
                                 <button class=" next"> NEXT</button>
                        </div>
                    </div>


                               <div class="page">
                        <div class="title">Contact Info: </div>
                        <div class="field">
                            <div class="label">Email</div>
                            <input type="email" id="email" required>
                        </div>

                         <div class="field">
                            <div class="label">Phone Number</div>
                            <input type="text" id="Phone" required>
                        </div>

                         <div class="field">
                             <button class="prev-1 prev"> Previous</button>
                             <button class="next-1 next"> Next</button>
                        </div>
                    </div>

                    

                               <div class="page">
                        <div class="title">Date of Birth:</div>
                        <div class="field">
                            <div class="label">Date</div>
                            <input type="date" id="Date" required>
                        </div>

                         <div class="field">
                            <div class="label">Gender</div>
                            <select  id="Gender">
                                <option value="">Male</option>
                                   <option value="">Female</option>
                            </select>
                        </div>

                         <div class="field">
                             <button class="prev-2"> Previous</button>
                             <button class="next-2 next"> Next</button>
                        </div>
                    </div>

                    
                               <div class="page">
                        <div class="title">Login Information:</div>
                        <div class="field">
                            <div class="label">UserName</div>
                            <input type="text" id="UserName" required>
                        </div>

                         <div class="field">
                             <button class="prev-3"> Previous</button>
                             <button class="submit" onsclick="sendEmail()" id="submit" type="button"> Next</button>
                        </div>
                    </div>


                </form>
            </div>

            
        </div>

        <script src="main.js"></script>

    </body>
</html>
